name: Build & Deploy

on:
  push:
    branches: [main]

# GitHub Pages 배포 권한
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.ghpages.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Puppeteer needs these on Ubuntu
      - name: Install Chromium deps
        run: npx puppeteer browsers install chrome

      - name: Build + Prerender
        run: npm run build

      # ── GitHub Pages 배포 ──
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Deploy to GitHub Pages
        id: ghpages
        uses: actions/deploy-pages@v4

      # ── Vercel 배포 ──
      - name: Prepare Vercel output
        run: |
          mkdir -p .vercel/output/static
          cp -r build/* .vercel/output/static/
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/404.html" }
            ]
          }
          EOF

      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
