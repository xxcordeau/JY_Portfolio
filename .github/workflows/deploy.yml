name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Puppeteer needs these on Ubuntu
      - name: Install Chromium deps
        run: npx puppeteer browsers install chrome

      - name: Build + Prerender
        run: npm run build

      # Vercel prebuilt output 구조 생성
      - name: Prepare Vercel output
        run: |
          mkdir -p .vercel/output/static
          cp -r build/* .vercel/output/static/
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/404.html" }
            ]
          }
          EOF

      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
